name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Format check
        run: yarn format:check

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test --watchAll=false

      - name: Install Playwright (browsers)
        run: yarn playwright install --with-deps chromium

      - name: E2E API smoke (public endpoints + optional keys)
        run: yarn e2e:apis
        env:
          REACT_APP_MAPBOX_ACCESS_TOKEN: ${{ secrets.REACT_APP_MAPBOX_ACCESS_TOKEN }}
          REACT_APP_OPENROUTESERVICE_API_KEY: ${{ secrets.REACT_APP_OPENROUTESERVICE_API_KEY }}
          REACT_APP_GRAPHHOPPER_API_KEY: ${{ secrets.REACT_APP_GRAPHHOPPER_API_KEY }}
          REACT_APP_GOOGLE_PLACES_API_KEY: ${{ secrets.REACT_APP_GOOGLE_PLACES_API_KEY }}

