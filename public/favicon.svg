<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32">
  <style>
    image.light { display: none; }
    image.dark { display: inline; }
    @media (prefers-color-scheme: light) {
      image.light { display: inline; }
      image.dark { display: none; }
    }
  </style>
  <image class="dark" width="32" height="32" href="data:image/png;base64,"/>
  <image class="light" width="32" height="32" href="data:image/png;base64,"/>
</svg>